version: 2 

sources: 
  - name: crm 
    description: "This source contains all customer relationship management (CRM) data, including customers and contracts. It is updated daily with new customers, contracts, and changes to existing customers and contracts."
    database: tnn-sb-dbt-ws-2026 
    schema: raw 
    tables: 
      - name: crm_customers
        description: "This table contains all customers of the company. It is updated daily with new customers and changes to existing customers." 
        meta:
          owner: crm-team
          update_frequency: daily
          pii: true
        config: 
          loaded_at_field: cast(created_at as timestamp)
          freshness: 
            warn_after: 
              count: 24 
              period: hour 
      - name: crm_contracts 
        description: "This table contains all contracts between the company and its customers. It is updated daily with new contracts and changes to existing contracts."
  - name: billing 
    description: "This source contains all billing-related data, including invoices and payments. It is updated daily with new invoices and payments, as well as changes to existing invoices and payments."
    database: tnn-sb-dbt-ws-2026 
    schema: raw 
    tables: 
      - name: billing_invoices 
        description: "This table contains all invoices generated by the company. It is updated daily with new invoices and changes to existing invoices."
      - name: billing_payments 
        description: "This table contains all payments made by customers. It is updated daily with new payments and changes to existing payments."
  - name: network 
    description: "This source contains all network-related data, including service activations and incidents. It is updated daily with new data and changes to existing data."
    database: tnn-sb-dbt-ws-2026 
    schema: raw 
    tables: 
      - name: network_service_activations 
        description: "This table contains all service activations for the company's network. It is updated daily with new service activations and changes to existing service activations."
      - name: network_incidents 
        description: "This table contains all incidents reported on the company's network. It is updated daily with new incidents and changes to existing incidents."  
  - name: catalog 
    description: "This source contains all product catalog data, including product information and pricing. It is updated daily with new products and changes to existing products."
    database: tnn-sb-dbt-ws-2026 
    schema: raw 
    tables: 
      - name: catalog_products 
        description: "This table contains all products offered by the company. It is updated daily with new products and changes to existing products."
