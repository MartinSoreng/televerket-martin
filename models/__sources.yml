version: 2

sources:
  - name: crm
    tables:
      - name: customers
        config:
          freshness:
            warn_after:
              count: 24
              period: hour
          loaded_at_field: created_at::timestamp
      - name: contracts
  - name: billing
    tables:
      - name: invoices
      - name: payments
  - name: network
    tables:
      - name: service_activations
      - name: incidents
  - name: catalog
    tables:
      - name: products
