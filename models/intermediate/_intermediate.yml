version: 2

models:
  - name: int_customers__enriched
    description: >
      Én rad per kunde, beriket med informasjon fra siste aktive kontrakt og
      utpakkede preferanser fra CRM. Kunder uten noen kontrakt (f.eks. C017)
      beholdes med null på alle kontraktfelt.
    config:
      materialized: table
      tags:
        - customer
        - daily
    columns:
      - name: customer_id
        description: Primærnøkkel. Unik kundeidentifikator arvet fra stg_crm__customers.
      - name: contract_status
        description: >
          Status på kundens siste aktive kontrakt, rangert etter start_date.
          Null for kunder uten noen kontrakt.
      - name: monthly_fee_eur
        description: >
          Månedlig beløp fra kundens siste kontrakt, castet fra VARCHAR til NUMERIC.
          Null for kunder uten kontrakt.
      - name: preferred_language
        description: Foretrukket språk pakket ut fra preferences-JSON. Null hvis ikke satt.
      - name: paperless_billing
        description: Om kunden har valgt papirfri faktura. Null hvis ikke satt.
      - name: marketing_opt_in
        description: Om kunden har samtykket til markedsføring. Null hvis ikke satt.
      - name: contract_start_date
        description: Startdato for kundens siste kontrakt. Null for kunder uten kontrakt.
      - name: contract_end_date
        description: Sluttdato for kundens siste kontrakt. Null for løpende eller ingen kontrakt.

  - name: int_billing__invoice_settlement
    description: >
      Fakturaer beriket med tilhørende betalingsinformasjon. Hver rad representerer en faktura, og betalingsfeltene er fylt ut hvis det finnes en matchende betaling.
    config:
      materialized: table
      tags:
        - billing
        - daily
    columns:
      - name: invoice_id
        description: Primærnøkkel. Unik fakturaidentifikator arvet fra stg_billing__invoices.
      - name: customer_id
        description: Fremmednøkkel til int_customers__enriched, arvet fra stg_billing__invoices.
      - name: invoice_date
        description: Datoen fakturaen ble utstedt, arvet fra stg_billing__invoices.
      - name: invoice_amount_eur
        description: Fakturabeløp i euro, arvet fra stg_billing__invoices.
      - name: invoice_status
        description: Status på fakturaen (f.eks. 'open', 'paid'), arvet fra stg_billing__invoices.
      - name: payment_id
        description: Unik identifikator for betalingen som er knyttet til fakturaen, arvet fra stg_billing__payments. Null hvis ingen betaling er knyttet.
      - name: payment_paid_on
        description: Datoen betalingen ble gjennomført, arvet fra stg_billing__payments. Null hvis ingen betaling er knyttet.
      - name: payment_amount_eur
        description: Betalingsbeløp i euro, arvet fra stg_billing__payments. Null hvis ingen betaling er knyttet.
      - name: payment_method
        description: Betalingsmetode (f.eks. 'credit_card', 'bank_transfer'), arvet fra stg_billing__payments. Null hvis ingen betaling er knyttet.
      - name: is_paid
        description: Boolean som indikerer om fakturaen er betalt (true) eller ikke (false), basert på om det finnes en tilknyttet betaling.